<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#fcfaf7"/>
  
  <!-- Flower icon (Lucide Flower2 style) -->
  <g transform="translate(50, 50) scale(2.2)">
    <!-- Center circle -->
    <circle cx="0" cy="0" r="3" fill="#d0bb95"/>
    
    <!-- Petals -->
    <circle cx="0" cy="-8" r="4" fill="none" stroke="#d0bb95" stroke-width="1.5"/>
    <circle cx="7" cy="-4" r="4" fill="none" stroke="#d0bb95" stroke-width="1.5"/>
    <circle cx="7" cy="4" r="4" fill="none" stroke="#d0bb95" stroke-width="1.5"/>
    <circle cx="0" cy="8" r="4" fill="none" stroke="#d0bb95" stroke-width="1.5"/>
    <circle cx="-7" cy="4" r="4" fill="none" stroke="#d0bb95" stroke-width="1.5"/>
    <circle cx="-7" cy="-4" r="4" fill="none" stroke="#d0bb95" stroke-width="1.5"/>
  </g>
</svg>
